services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "7777:5678"
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - GENERIC_TIMEZONE=Asia/Bangkok
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
      - N8N_AI_ENABLED=true
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
      - N8N_RESTRICT_ENVIRONMENT_VARIABLES_ACCESS=false
    volumes:
      - n8n_data:/home/node/.n8n
      - /Users/loongallday/Downloads/pde-sales-connect-1d0156258d88.json:/config/google-credentials.json:ro
    depends_on:
      - postgres

  flowise:
    image: flowiseai/flowise:2.2.7
    restart: always
    ports:
      - "7778:3000"
    environment:
      - FLOWISE_SECRETKEY_OVERWRITE=flowise-demo-secret-key-2024
      - FLOWISE_FILE_SIZE_LIMIT=50mb
      - DISABLE_FLOWISE_TELEMETRY=true
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${POSTGRES_DB}
      - DATABASE_USER=${POSTGRES_USER}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - flowise_data:/root/.flowise
    depends_on:
      - postgres

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    ports:
      - "7782:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "7779:5432"

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "7780:80"
      - "7781:443"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ../demo-dashboard:/srv/demo-dashboard:ro

  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3002:3002"
    environment:
      - GOOGLE_SERVICE_ACCOUNT_JSON=/config/google-credentials.json
    volumes:
      - /Users/loongallday/Downloads/pde-sales-connect-1d0156258d88.json:/config/google-credentials.json:ro

volumes:
  n8n_data:
  flowise_data:
  postgres_data:
  qdrant_data:
  caddy_data:
  caddy_config:
